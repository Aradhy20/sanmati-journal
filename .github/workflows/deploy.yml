name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    if: github.repository == 'Aradhy20/sanmati-journal' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build

      - name: Build Laravel Backend
        working-directory: ./sanmati-core
        run: composer install --no-dev --optimize-autoloader

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'Aradhy20/sanmati-journal' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug SSH Key Secret
        run: |
          KEY_VAL="${{ secrets.PROD_SSH_KEY }}"
          if [ -z "$KEY_VAL" ]; then
            echo "PROD_SSH_KEY is empty or not set!"
          else
            echo "PROD_SSH_KEY is NOT empty."
            echo "Length of key is: ${#KEY_VAL} characters."
            if [[ "$KEY_VAL" == *"BEGIN"* ]]; then
              echo "Key contains 'BEGIN'."
            else
              echo "WARNING: Key does NOT contain 'BEGIN'!"
            fi
            if [[ "$KEY_VAL" == *"END"* ]]; then
              echo "Key contains 'END'."
            else
              echo "WARNING: Key does NOT contain 'END'!"
            fi
            if [[ "$KEY_VAL" == *$'\r'* ]]; then
              echo "WARNING: Key contains carriage return (\r) characters!"
            fi
          fi

      - name: Setup SSH Key for Deployment
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Rsync to Remote Server 
        run: |
          ssh-keyscan -H ${{ secrets.PROD_SERVER_IP }} >> ~/.ssh/known_hosts
          rsync -azP --delete --exclude='.env' --exclude='storage/' --exclude='bootstrap/cache/' ./ ${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER_IP }}:/var/www/sanmatijournal/
          
      - name: Run remote commands
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER_IP }} "cd /var/www/sanmatijournal/sanmati-core && php artisan migrate --force && php artisan config:cache"
