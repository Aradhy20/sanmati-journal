name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    if: github.repository == 'Aradhy20/sanmati-journal' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build

      - name: Build Laravel Backend
        working-directory: ./sanmati-core
        run: composer install --no-dev --optimize-autoloader

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'Aradhy20/sanmati-journal' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug SSH Key Secret
        run: |
          OUT_FILE="debug_ssh.txt"
          echo "=== SSH Key & Deployment Secrets Debug ===" > $OUT_FILE
          
          check_secret() {
            local name=$1
            local val=$2
            if [ -z "$val" ]; then
              echo "$name: is empty or not set" >> $OUT_FILE
            else
              echo "$name: is set (length: ${#val})" >> $OUT_FILE
              if [[ "$val" == *"BEGIN"* ]]; then
                echo "  - Contains 'BEGIN'" >> $OUT_FILE
              fi
              if [[ "$val" == *"END"* ]]; then
                echo "  - Contains 'END'" >> $OUT_FILE
              fi
            fi
          }
          
          check_secret "PROD_SSH_KEY" "${{ secrets.PROD_SSH_KEY }}"
          check_secret "SSH_PRIVATE_KEY" "${{ secrets.SSH_PRIVATE_KEY }}"
          check_secret "SSH_KEY" "${{ secrets.SSH_KEY }}"
          check_secret "DEPLOY_KEY" "${{ secrets.DEPLOY_KEY }}"
          check_secret "PROD_SERVER_IP" "${{ secrets.PROD_SERVER_IP }}"
          check_secret "PROD_USER" "${{ secrets.PROD_USER }}"
          check_secret "SERVER_IP" "${{ secrets.SERVER_IP }}"
          check_secret "SERVER_USER" "${{ secrets.SERVER_USER }}"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B debug-deploy
          git add $OUT_FILE
          git commit -m "chore: add debug_ssh.txt"
          git push -f origin debug-deploy

      - name: Setup SSH Key for Deployment
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Rsync to Remote Server 
        run: |
          ssh-keyscan -H ${{ secrets.PROD_SERVER_IP }} >> ~/.ssh/known_hosts
          rsync -azP --delete --exclude='.env' --exclude='storage/' --exclude='bootstrap/cache/' ./ ${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER_IP }}:/var/www/sanmatijournal/
          
      - name: Run remote commands
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER_IP }} "cd /var/www/sanmatijournal/sanmati-core && php artisan migrate --force && php artisan config:cache"
