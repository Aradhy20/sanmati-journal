name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Lints and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Web Accessibility, Performance & SEO Checks (Lighthouse CI)
        run: npm install -g @lhci/cli@0.12.x && lhci autorun
        env:
           LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:unit --if-present

      - name: Run Playwright E2E Tests
        run: |
          npx playwright install --with-deps
          npx playwright test

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    if: github.repository == 'owner/repo' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build

      - name: Build Laravel Backend
        run: composer install --no-dev --optimize-autoloader

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'owner/repo' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key for Deployment
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Rsync to Remote Server 
        run: |
          ssh-keyscan -H ${{ secrets.PROD_SERVER_IP }} >> ~/.ssh/known_hosts
          rsync -azP --delete ./ ${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER_IP }}:/var/www/sanmatijournal/
          
      - name: Run remote commands
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER_IP }} "cd /var/www/sanmatijournal && php artisan migrate --force && php artisan config:cache"
