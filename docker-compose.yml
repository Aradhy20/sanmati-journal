version: '3.8'

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sanmati_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: sanmati_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache & Queue ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sanmati_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Express API ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanmati_backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:secretpassword@postgres:5432/sanmati_dev?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: sanmati_jwt_super_secret_session_token_key_2026
      AUDIT_SECRET_KEY: sanmati_tamper_evident_signature_private_secret_key
      JOURNAL_ISSN: '0000-0000'
      DOI_PREFIX: '10.12345'
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro  # Hot-reload via tsx watch

  # ── Background Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sanmati_worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:secretpassword@postgres:5432/sanmati_dev?schema=public
      REDIS_URL: redis://redis:6379
      JOURNAL_ISSN: '0000-0000'
      DOI_PREFIX: '10.12345'
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sanmati_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://backend:4000
      NEXT_PUBLIC_JOURNAL_ISSN: '0000-0000'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
